services:
  mtprotoproxy:
    build:
      context: .
    container_name: mtprotoproxy
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-443}:${PORT:-443}/tcp"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket, os; s = socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', int(os.getenv('PORT', '443')))); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-file: "10"
        max-size: "10m"
